<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0D1B4C" />
    <title>Acoustic Steps</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="icon-button" id="backButton" aria-label="Go back" title="Back">
          <span aria-hidden="true">&#8249;</span>
        </button>
        <div>
          <p class="eyebrow" id="screenEyebrow">Beginner guitar</p>
          <h1 id="screenTitle">Acoustic Steps</h1>
        </div>
        <button class="icon-button" id="settingsShortcut" aria-label="Open settings" title="Settings">
          <span aria-hidden="true">&#9881;</span>
        </button>
      </header>

      <main id="app" tabindex="-1"></main>

      <nav class="bottom-nav" aria-label="Primary navigation">
        <button data-screen="home" class="nav-item active" aria-label="Home">
          <span class="nav-icon">&#8962;</span>
          <span>Home</span>
        </button>
        <button data-screen="lessons" class="nav-item" aria-label="Lessons">
          <span class="nav-icon">&#9636;</span>
          <span>Lessons</span>
        </button>
        <button data-screen="chords" class="nav-item nav-item-center" aria-label="Chord Library">
          <span class="nav-icon guitar-mark" aria-hidden="true"></span>
          <span>Chords</span>
        </button>
        <button data-screen="practice" class="nav-item" aria-label="Practice">
          <span class="nav-icon">&#9684;</span>
          <span>Practice</span>
        </button>
        <button data-screen="progress" class="nav-item" aria-label="Profile">
          <span class="nav-icon">&#9673;</span>
          <span>Profile</span>
        </button>
      </nav>
    </div>

    <script src="app.js"></script>
  </body>
</html>
